name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  smoke:
    name: build+test (${{ matrix.os }} / node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: ['20']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          check-latest: true
          cache: npm
      - name: Install (workspaces)
        run: npm install
      - name: Tests (backend)
        run: npm test
      - name: Build (web + backend)
        run: npm run build
      - name: Global install + version
        run: |
          npm install -g .
          clean-my-home --version
      - name: Pack dry-run (files whitelist)
        run: npm pack --dry-run
